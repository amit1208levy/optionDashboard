<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options Dashboard — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    label:first-of-type { margin-top: 0; }

    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #7c3aed; }

    input::placeholder { color: #475569; }

    .hint {
      font-size: 11px;
      color: #475569;
      margin-top: 4px;
    }

    .error {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 20px;
    }

    button[type="submit"] {
      margin-top: 28px;
      width: 100%;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Options Dashboard</h1>
      <p>Connect your TastyTrade account to get started</p>
    </div>

    <form method="POST">
      <label for="name">Your Name</label>
      <input id="name" name="name" type="text" placeholder="e.g. Amit" autocomplete="off" required />

      <label for="client_id">TastyTrade Client ID</label>
      <input id="client_id" name="client_id" type="text" placeholder="Your OAuth client ID" autocomplete="off" required />

      <label for="refresh_token">TastyTrade Refresh Token</label>
      <input id="refresh_token" name="refresh_token" type="password" placeholder="Long-lived refresh token" autocomplete="off" required />
      <p class="hint">Found in your TastyTrade developer / API settings</p>

      <label for="secret_token">Secret Token</label>
      <input id="secret_token" name="secret_token" type="password" placeholder="Your local secret token" autocomplete="off" required />
      <p class="hint">Used to protect local access to this dashboard</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <button type="submit">Save &amp; Continue</button>
    </form>
  </div>
</body>
</html>
