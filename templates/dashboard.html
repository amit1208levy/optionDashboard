<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 18px; font-weight: 700; color: #a78bfa; }
    header p  { font-size: 13px; color: #64748b; }

    .logout {
      font-size: 12px;
      color: #475569;
      text-decoration: none;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 6px 12px;
      transition: color 0.15s, border-color 0.15s;
    }
    .logout:hover { color: #e2e8f0; border-color: #475569; }

    main {
      max-width: 860px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 16px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    .test-btn {
      margin-top: 20px;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      transition: background 0.15s;
    }
    .test-btn:hover { background: #6d28d9; }
    .test-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    #api-result {
      margin-top: 16px;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
    }
    #api-result.success {
      background: #052e16;
      border: 1px solid #166534;
      color: #86efac;
    }
    #api-result.error {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Options Dashboard</h1>
      <p>Welcome back, {{ name }}</p>
    </div>
    <a class="logout" href="/logout">Reset credentials</a>
  </header>

  <main>
    <p class="section-title">API Connection</p>
    <div class="card">
      <h2>TastyTrade API</h2>
      <p>Test that your saved refresh token can successfully exchange for a live access token.</p>
      <button class="test-btn" id="test-btn" onclick="testConnection()">Test Connection</button>
      <div id="api-result"></div>
    </div>

    <p class="section-title">Portfolio</p>
    <div class="card">
      <h2>Coming soon</h2>
      <p>Once your API connection is confirmed, positions, P&amp;L, and Greeks will appear here.</p>
    </div>
  </main>

  <script>
    async function testConnection() {
      const btn = document.getElementById("test-btn");
      const result = document.getElementById("api-result");
      btn.disabled = true;
      btn.textContent = "Testing…";
      result.style.display = "none";

      try {
        const resp = await fetch("/api/test-connection", { method: "POST" });
        const data = await resp.json();
        result.style.display = "block";
        result.className = data.success ? "success" : "error";
        result.textContent = data.message + (data.token_preview ? ` (token: ${data.token_preview})` : "");
      } catch (e) {
        result.style.display = "block";
        result.className = "error";
        result.textContent = "Request failed: " + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Test Connection";
      }
    }
  </script>
</body>
</html>
